<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Quick Video Speed Control</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="panel">
      <header class="hero">
        <img class="app-icon" src="icons/icon-48.png" alt="">
        <div class="brand">
          <h1 data-i18n="popupTitle">Quick Video Speed Control</h1>
          <label class="popup-language">
            <span data-i18n="languageBilingual">Language / 语言</span>
            <select id="language" aria-label="Language / 语言">
              <option value="en">English</option>
              <option value="zh">中文</option>
            </select>
          </label>
        </div>
        <label class="switch" title="Enable or disable extension" data-i18n-title="appEnabledTitle">
          <input id="enabled" type="checkbox" aria-label="Enable extension" data-i18n-aria-label="appEnabledAria">
          <span></span>
        </label>
      </header>

      <section class="rate-panel">
        <div class="rate-head">
          <span data-i18n="holdRate">Hold speed</span>
          <strong id="holdRateValue">2.0x</strong>
        </div>
        <input id="holdRate" type="range" min="1.1" max="5" step="0.1" aria-label="Hold speed" data-i18n-aria-label="holdRate">
        <div class="presets" id="presetRates" aria-label="Speed presets" data-i18n-aria-label="presetRates"></div>
      </section>

      <section class="video-panel">
        <div class="video-status">
          <span id="videoState" class="state-pill">Checking</span>
          <span id="videoMeta">Current tab</span>
        </div>
        <div class="action-grid">
          <button id="saveVideo" class="primary-action" type="button" disabled>
            <svg class="download-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 3v10"></path>
              <path d="m7 9 5 5 5-5"></path>
              <path d="M5 15v3a3 3 0 0 0 3 3h8a3 3 0 0 0 3-3v-3"></path>
            </svg>
            <span data-i18n="saveVideo">Save current video</span>
          </button>
          <button id="copyVideoUrl" type="button" disabled data-i18n="copyUrl">Copy URL</button>
        </div>
        <p id="videoHint" class="status-text">Checking page video.</p>
      </section>

      <section class="control-grid">
        <label class="mini-field">
          <span data-i18n="triggerDelay">Trigger delay</span>
          <output id="delayValue">180ms</output>
          <input id="longPressDelayMs" type="range" min="0" max="500" step="20" aria-label="Trigger delay" data-i18n-aria-label="triggerDelay">
        </label>

        <label class="mini-field">
          <span data-i18n="seekStep">Seek step</span>
          <output id="seekStepValue">5s</output>
          <input id="seekStepSeconds" type="range" min="1" max="30" step="1" aria-label="Seek step" data-i18n-aria-label="seekStep">
        </label>

        <div class="key-summary">
          <span><span data-i18n="speedKey">Speed key</span> <strong id="speedHoldKeyLabel">Space</strong></span>
          <span><span data-i18n="backward">Back</span> <strong id="seekBackwardKeyLabel">←</strong></span>
          <span><span data-i18n="forward">Forward</span> <strong id="seekForwardKeyLabel">→</strong></span>
        </div>

        <label class="toggle-line">
          <input id="enableSeekKeys" type="checkbox">
          <span data-i18n="enableSeekKeys">Enable seek keys</span>
        </label>

        <label class="toggle-line">
          <input id="showBadge" type="checkbox">
          <span data-i18n="showBadge">Show speed badge</span>
        </label>

        <label class="select-line">
          <span data-i18n="shortPressAction">Short press speed key</span>
          <select id="shortPressAction">
            <option value="pause" data-i18n="pauseVideo">Pause video</option>
            <option value="none" data-i18n="doNothing">Do nothing</option>
          </select>
        </label>
      </section>

      <section id="downloadProgressPanel" class="download-progress-panel" hidden>
        <div class="download-progress-head">
          <span id="downloadProgressLabel">Preparing download</span>
          <strong id="downloadProgressValue">0%</strong>
        </div>
        <progress id="downloadProgress" value="0" max="100"></progress>
      </section>

      <footer>
        <button id="openOptions" type="button" data-i18n="fullSettings">Full settings</button>
        <button id="reset" type="button" class="ghost" data-i18n="reset">Reset</button>
      </footer>
    </main>
    <script src="shared/settings.js"></script>
    <script src="shared/i18n.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
